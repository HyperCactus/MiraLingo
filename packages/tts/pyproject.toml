[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "mirad-tts"
version = "0.1.0"
description = "Mirad text-to-speech preparation: tokenisation, syllabification, stress assignment, and IPA transcription."
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
dependencies = []

[project.optional-dependencies]
piper = ["numpy", "piper-tts>=1.4.0"]
all = ["mirad-tts[piper]"]

[project.scripts]
mirad-tts = "mirad_tts.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/mirad_tts"]

[tool.pytest.ini_options]
testpaths = ["tests"]
filterwarnings = ["error"]