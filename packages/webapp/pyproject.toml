[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "mirad-webapp"
version = "0.1.0"
description = "Mirad language learning web application."
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
dependencies = [
    "bcrypt>=4.0",
    "fastapi>=0.100",
    "authlib>=1.3",
    "itsdangerous>=2.1",
    "python-dotenv>=1.0",
    "uvicorn[standard]>=0.23",
    "wordfreq>=3.1",
]

[project.optional-dependencies]
test = [
    "httpx>=0.24",
    "httpx2>=0.1",
    "pytest>=8",
]

[project.scripts]
miralingo-content-import = "mirad_webapp.content_cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/mirad_webapp"]

[tool.pytest.ini_options]
testpaths = ["tests"]
filterwarnings = ["error"]