[build-system]
requires = ["setuptools>=45", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "mirad-translator"
version = "0.1.0"
description = "Translate English to Mirad using DSPy and Ollama"
readme = "README.md"
authors = [{name = "Mirad Team"}]
license = {text = "MIT"}
keywords = ["mirad", "translation", "dspy", "ollama"]
classifiers = [
    "Development Status: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
]
requires-python = ">=3.9"
dependencies = [
    "dspy-ai>=2.1",
    "ollama",
    "fastapi",
    "uvicorn[standard]",
    "requests",
    "wordfreq>=2.10.0",
]

[project.urls]
Homepage = "https://github.com/Project_earthlingish/Mirad-phonemes-engine"

[project.optional-dependencies.rag]
rag = [
    "chromadb>=0.4.0",
    "sentence-transformers>=2.2.0",
    "peft>=0.19.0",
]

[project.optional-dependencies.eval]
eval = [
    "chromadb>=0.4.0",
    "sentence-transformers>=2.2.0",
    "peft>=0.19.0",
    "wordfreq>=2.10.0",
    "tiktoken>=0.5.0",
]

[project.optional-dependencies.develop]
develop = [
    "pytest",
    "pytest-cov",
    "chromadb>=0.4.0",
    "sentence-transformers>=2.2.0",
    "peft>=0.19.0",
    "wordfreq>=2.10.0",
    "tiktoken>=0.5.0",
]

[project.scripts]
mirad-translate = "mirad_translator.cli:main"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
"mirad_translator" = [
    "data/*.json"
]