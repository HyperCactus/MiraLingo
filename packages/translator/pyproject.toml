[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "mirad-translator"
version = "0.1.0"
description = "Bidirectional translator between Mirad and other languages."
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"

[tool.pytest.ini_options]
testpaths = ["tests"]
filterwarnings = ["error"]