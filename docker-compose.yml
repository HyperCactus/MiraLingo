services:
  tts:
    build:
      context: .
      dockerfile: packages/tts/Dockerfile
      network: host
    dns:
      - 8.8.8.8
      - 8.8.4.4
    working_dir: /app
    command: ["mirad-tts", "--help"]

  ollama:
    image: ollama/ollama:latest
    dns:
      - 8.8.8.8
      - 8.8.4.4
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/version"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  translator:
    build:
      context: .
      dockerfile: packages/translator/Dockerfile
      network: host
    dns:
      - 8.8.8.8
      - 8.8.4.4
    working_dir: /app
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s