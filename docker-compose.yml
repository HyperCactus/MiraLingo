services:
  tts:
    build:
      context: .
      dockerfile: packages/tts/Dockerfile
    network_mode: host
    command: ["mirad-tts", "--help"]

  ollama:
    image: ollama/ollama:latest
    network_mode: host
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/11434'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  translator:
    build:
      context: .
      dockerfile: packages/translator/Dockerfile
      network: host
    network_mode: host
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ./data:/app/data:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s